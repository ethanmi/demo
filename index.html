<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>能源互联网平台原型</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231677ff'/%3E%3Ctext x='16' y='21' text-anchor='middle' font-size='16' fill='white'%3E%E8%83%BD%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #f3f6fb;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --line: #e3e8f2;
      --text: #162033;
      --muted: #60708a;
      --primary: #1677ff;
      --primary-soft: #e8f2ff;
      --success: #18a058;
      --warning: #fa8c16;
      --danger: #f5222d;
      --shadow: 0 18px 42px rgba(16, 36, 94, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(22, 119, 255, 0.12), transparent 28%),
        linear-gradient(180deg, #f7f9fd 0%, #eef3f9 100%);
      color: var(--text);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .app-shell {
      display: grid;
      grid-template-columns: 268px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 24px 18px;
      background:
        linear-gradient(180deg, rgba(10, 26, 59, 0.96), rgba(19, 39, 78, 0.96)),
        #102347;
      color: #eef4ff;
      border-right: 1px solid rgba(255, 255, 255, 0.06);
    }

    .brand {
      padding: 18px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.05));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #4da4ff, #7dd3fc);
      color: #102347;
      font-weight: 700;
      font-size: 20px;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0.02em;
    }

    .brand p {
      margin: 8px 0 0;
      color: rgba(238, 244, 255, 0.72);
      font-size: 13px;
      line-height: 1.6;
    }

    .nav-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .nav-group-title {
      padding: 0 12px;
      color: rgba(238, 244, 255, 0.56);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nav-item {
      width: 100%;
      border: 0;
      background: transparent;
      color: rgba(238, 244, 255, 0.86);
      text-align: left;
      padding: 13px 14px;
      border-radius: 14px;
      cursor: pointer;
      transition: 160ms ease;
    }

    .nav-item:hover,
    .nav-item.active {
      background: linear-gradient(135deg, rgba(77, 164, 255, 0.24), rgba(125, 211, 252, 0.12));
      color: #fff;
      transform: translateX(2px);
    }

    .sidebar-note {
      margin-top: auto;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(238, 244, 255, 0.78);
      font-size: 13px;
      line-height: 1.7;
    }

    .main {
      padding: 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .topbar.hidden {
      display: none;
    }

    .crumbs h2 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0.01em;
    }

    .crumbs p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .status-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(22, 119, 255, 0.12);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(135deg, #52c41a, #95de64);
      box-shadow: 0 0 0 6px rgba(82, 196, 26, 0.14);
    }

    .page-layout {
      display: grid;
      gap: 20px;
    }

    .page-layout.dual {
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      align-items: start;
    }

    .split-panels {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
      align-items: start;
    }

    .device-type-shell .card-body {
      padding: 0;
    }

    .device-type-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.15fr);
      align-items: start;
    }

    .device-pane {
      padding: 22px;
    }

    .device-pane + .device-pane {
      border-left: 1px solid var(--line);
    }

    .device-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .device-toolbar.right {
      flex-direction: column;
      align-items: flex-start;
    }

    .device-toolbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .segmented-tabs {
      display: inline-flex;
      align-items: center;
      padding: 4px;
      border-radius: 14px;
      background: #f3f6fb;
      border: 1px solid #e1e8f3;
    }

    .segmented-tab {
      min-height: 38px;
      padding: 0 16px;
      border-radius: 10px;
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: 160ms ease;
    }

    .segmented-tab.active {
      background: #fff;
      color: var(--primary);
      box-shadow: 0 6px 16px rgba(17, 48, 107, 0.08);
    }

    .table-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 4px 0;
      color: var(--muted);
      font-size: 14px;
    }

    .pagination {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .page-pill {
      min-width: 42px;
      height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      border-radius: 12px;
      border: 1px solid #d9e3f1;
      background: #fff;
      color: var(--muted);
    }

    .page-pill.active {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: rgba(22, 119, 255, 0.18);
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(227, 232, 242, 0.92);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }

    .card-title h3 {
      margin: 0;
      font-size: 18px;
    }

    .card-title p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .card-body {
      padding: 20px;
    }

    .search-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px 16px;
      align-items: end;
    }

    .search-card .card-body {
      padding: 16px 20px;
    }

    .search-card.compact .card-body {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .search-card.compact .search-grid {
      flex: 1;
      grid-template-columns: repeat(auto-fit, minmax(180px, 220px));
    }

    .search-card.compact .form-actions {
      margin-left: auto;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      border: 1px solid #d7dfeb;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      transition: 160ms ease;
    }

    .field textarea {
      min-height: 94px;
      resize: vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      outline: none;
      border-color: rgba(22, 119, 255, 0.48);
      box-shadow: 0 0 0 4px rgba(22, 119, 255, 0.12);
    }

    .form-actions,
    .list-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .list-header {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: stretch;
    }

    .list-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .list-actions.right {
      justify-content: flex-end;
      margin-left: auto;
    }

    .btn {
      min-height: 40px;
      padding: 0 16px;
      border-radius: 12px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: 160ms ease;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, #1677ff, #4096ff);
      color: #fff;
      box-shadow: 0 10px 18px rgba(22, 119, 255, 0.18);
    }

    .btn-default {
      background: #fff;
      color: var(--text);
      border-color: #d7dfeb;
    }

    .btn-secondary {
      background: #eef2f7;
      color: #435266;
      border-color: #d6deea;
      box-shadow: none;
    }

    .btn-link {
      background: transparent;
      border: 0;
      color: var(--primary);
      padding: 0;
      min-height: auto;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--muted);
      border: 1px solid #e4ebf6;
      font-size: 13px;
    }

    .chip.active {
      background: var(--primary-soft);
      color: var(--primary);
      border-color: rgba(22, 119, 255, 0.2);
    }

    .table-wrap {
      overflow: auto;
    }

    .station-table {
      min-width: 1280px;
    }

    .station-table th,
    .station-table td {
      white-space: nowrap;
    }

    .topology-page {
      display: grid;
      gap: 22px;
    }

    .topology-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 6px 4px 0;
    }

    .topology-back {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      border: 1px solid #d7dfeb;
      background: #fff;
      color: var(--text);
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
    }

    .topology-header h2 {
      margin: 0;
      font-size: 20px;
    }

    .topology-header p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .topology-surface {
      background: #fff;
      border: 1px solid #e2e8f3;
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topology-workbench {
      display: flex;
      align-items: stretch;
      min-height: 760px;
    }

    .topology-workbench.drawer-open .topology-stage::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(17, 28, 48, 0.22);
      pointer-events: none;
    }

    .topology-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 20px 24px 0;
      flex-wrap: wrap;
    }

    .topology-toolbar-group {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topology-stage {
      position: relative;
      flex: 1;
      overflow: auto;
      min-height: 760px;
      padding: 30px 24px 40px;
      background-color: #fcfdff;
      background-image: radial-gradient(circle, rgba(191, 204, 226, 0.72) 1px, transparent 1.2px);
      background-size: 18px 18px;
    }

    .topology-stage-inner {
      position: relative;
      width: 100%;
      min-height: 100%;
    }

    .topology-tree {
      position: absolute;
      top: 0;
      left: 50%;
      min-width: 1260px;
      display: flex;
      justify-content: center;
      padding: 12px 12px 20px;
      transform: translateX(-50%) scale(1);
      transform-origin: top center;
      transition: transform 180ms ease;
    }

    .topology-branch {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .topology-card {
      width: 286px;
      border-radius: 18px;
      background: #fff;
      border: 1px solid #dfe7f5;
      box-shadow: 0 18px 34px rgba(46, 73, 124, 0.12);
      overflow: hidden;
      cursor: pointer;
    }

    .topology-card.selected {
      box-shadow: 0 0 0 4px rgba(53, 102, 255, 0.18), 0 22px 40px rgba(46, 73, 124, 0.16);
    }

    .topology-card.root {
      width: 318px;
    }

    .topology-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 16px;
      color: #fff;
      background: linear-gradient(135deg, #6f7ae6, #7f8af2);
    }

    .topology-card.root .topology-card-header {
      background: linear-gradient(135deg, #515b70, #616c82);
    }

    .topology-card-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      font-weight: 700;
    }

    .topology-card-icon {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.22);
      font-size: 14px;
    }

    .topology-card-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .topology-card-actions button {
      border: 0;
      background: transparent;
      color: rgba(255, 255, 255, 0.92);
      cursor: pointer;
      font-size: 12px;
      padding: 0;
    }

    .topology-card-body {
      padding: 20px 16px 18px;
    }

    .topology-card.root .topology-card-body {
      min-height: 86px;
      display: flex;
      align-items: center;
      font-size: 20px;
      color: #384252;
    }

    .topology-link-button {
      width: 100%;
      min-height: 42px;
      border-radius: 12px;
      border: 1px solid #86a2ff;
      background: #fff;
      color: #3566ff;
      font-weight: 600;
      cursor: pointer;
    }

    .topology-plus {
      position: relative;
      width: 34px;
      height: 34px;
      margin: 18px 0 26px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      border: 1px solid #d8e0ee;
      background: #fff;
      color: #7686a3;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(85, 110, 155, 0.1);
    }

    .topology-plus::before,
    .topology-plus::after {
      content: "";
      position: absolute;
      left: 50%;
      width: 3px;
      transform: translateX(-50%);
      background: #b7c7e2;
    }

    .topology-plus::before {
      top: -20px;
      height: 20px;
    }

    .topology-plus::after {
      top: 34px;
      height: 26px;
    }

    .topology-children {
      position: relative;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 56px;
      padding-top: 40px;
    }

    .topology-children::before {
      content: "";
      position: absolute;
      top: 0;
      left: 16.666%;
      right: 16.666%;
      height: 3px;
      background: #b7c7e2;
      border-radius: 999px;
    }

    .topology-children.single::before {
      left: 50%;
      right: auto;
      width: 3px;
      height: 24px;
      transform: translateX(-50%);
    }

    .topology-children > .topology-branch::before {
      content: "";
      position: absolute;
      top: -40px;
      left: 50%;
      width: 3px;
      height: 40px;
      transform: translateX(-50%);
      background: #b7c7e2;
    }

    .topology-children.single > .topology-branch::before {
      display: none;
    }

    .topology-drawer {
      width: 468px;
      background: #fff;
      border-left: 1px solid #e3eaf6;
      display: flex;
      flex-direction: column;
      min-height: 760px;
    }

    .topology-drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 22px;
      color: #fff;
      background: linear-gradient(135deg, #6f7ae6, #7f8af2);
    }

    .topology-drawer-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
      font-weight: 700;
    }

    .topology-drawer-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.24);
    }

    .topology-drawer-close {
      border: 0;
      background: transparent;
      color: rgba(255, 255, 255, 0.92);
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
    }

    .topology-drawer-body {
      flex: 1;
      padding: 22px 26px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .topology-drawer-form {
      display: grid;
      gap: 18px;
    }

    .topology-drawer-row {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      align-items: center;
      gap: 18px;
    }

    .topology-drawer-row label {
      color: #4b5b76;
      font-size: 14px;
      white-space: nowrap;
    }

    .topology-drawer-row .required::before {
      content: "*";
      color: #f04438;
      margin-right: 4px;
    }

    .topology-drawer-row input,
    .topology-drawer-row select,
    .topology-drawer-row textarea {
      width: 100%;
      min-height: 46px;
      border: 1px solid #d9e2ef;
      border-radius: 12px;
      background: #f5f7fb;
      color: var(--text);
      padding: 10px 14px;
    }

    .topology-drawer-row textarea {
      min-height: 88px;
      resize: vertical;
    }

    .topology-drawer-tip {
      padding: 16px 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(22, 119, 255, 0.08), rgba(111, 122, 230, 0.08));
      border: 1px solid rgba(22, 119, 255, 0.14);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .topology-drawer-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      padding: 18px 24px 24px;
      border-top: 1px solid #e8eef7;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 720px;
    }

    th,
    td {
      padding: 14px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      font-size: 14px;
    }

    th {
      background: #f8fafc;
      color: var(--muted);
      font-weight: 600;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tbody tr {
      transition: 140ms ease;
    }

    tbody tr:hover {
      background: rgba(22, 119, 255, 0.04);
    }

    tbody tr.selected {
      background: rgba(22, 119, 255, 0.08);
    }

    .cell-title {
      font-weight: 600;
      color: var(--text);
    }

    .cell-sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .tag-blue {
      background: rgba(22, 119, 255, 0.1);
      color: #1668dc;
    }

    .tag-green {
      background: rgba(24, 160, 88, 0.12);
      color: #157347;
    }

    .tag-orange {
      background: rgba(250, 140, 22, 0.12);
      color: #c56a14;
    }

    .tag-red {
      background: rgba(245, 34, 45, 0.1);
      color: #cf1322;
    }

    .table-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      white-space: nowrap;
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .metric {
      padding: 16px;
      border-radius: 16px;
      background: linear-gradient(180deg, #ffffff, #f7faff);
      border: 1px solid #e6edf8;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .metric strong {
      font-size: 24px;
      letter-spacing: 0.02em;
    }

    .hint-box {
      margin-top: 18px;
      padding: 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(22, 119, 255, 0.08), rgba(24, 160, 88, 0.06));
      border: 1px solid rgba(22, 119, 255, 0.12);
      color: var(--muted);
      line-height: 1.7;
      font-size: 13px;
    }

    .modal-mask {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(7, 16, 32, 0.42);
      backdrop-filter: blur(8px);
      z-index: 30;
    }

    .modal-mask.show {
      display: flex;
    }

    .modal {
      width: min(880px, 100%);
      max-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
      background: #fff;
      border-radius: 24px;
      border: 1px solid rgba(227, 232, 242, 0.92);
      box-shadow: 0 24px 60px rgba(8, 19, 44, 0.22);
      overflow: hidden;
    }

    .modal-header,
    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
    }

    .modal-footer {
      border-top: 1px solid var(--line);
      border-bottom: 0;
    }

    .modal-body {
      padding: 22px;
      overflow: auto;
    }

    .modal-title h3 {
      margin: 0;
      font-size: 20px;
    }

    .modal-title p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .section-title {
      margin: 0 0 14px;
      font-size: 15px;
      color: var(--text);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .form-grid.single {
      grid-template-columns: 1fr;
    }

    .span-2 {
      grid-column: span 2;
    }

    .empty {
      padding: 36px 18px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 1180px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        padding-bottom: 18px;
      }

      .page-layout.dual {
        grid-template-columns: 1fr;
      }

      .split-panels {
        grid-template-columns: 1fr;
      }

      .device-type-layout {
        grid-template-columns: 1fr;
      }

      .device-pane + .device-pane {
        border-left: 0;
        border-top: 1px solid var(--line);
      }

      .search-card.compact .card-body {
        display: block;
      }

      .search-card.compact .form-actions {
        margin-top: 16px;
        margin-left: 0;
      }

      .list-toolbar {
        align-items: stretch;
      }

      .list-actions.right {
        margin-left: 0;
        justify-content: flex-start;
      }

      .topology-toolbar {
        align-items: stretch;
      }

      .topology-workbench {

      }

      .topology-drawer {
        width: 100%;
        min-height: auto;
        border-left: 0;
        border-top: 1px solid #e3eaf6;
      }
    }

    @media (max-width: 760px) {
      .main {
        padding: 16px;
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .form-grid,

      }

      }

      }

        gap: 28px;
      }

      .topology-drawer-row {

        gap: 8px;

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function getActiveViewId() {
      if (state.currentView === "topology-config") return "station-management";
      return state.currentView;
    }

    function renderNav() {
      const activeViewId = getActiveViewId();
      navRoot.innerHTML = navItems.map((group) => {
        const itemsHtml = group.items.map((item) => `
          <button class="nav-item ${activeViewId === item.id ? "active" : ""}" type="button" data-nav="${item.id}">
            ${item.label}
          </button>
        `).join("");
        return `
          <div class="nav-group">
            <div class="nav-group-title">${group.group}</div>
            <div class="nav-list">${itemsHtml}</div>
          </div>
        `;
      }).join("");
    }

    function renderTopbar() {
      if (state.currentView === "topology-config") {

      }
      topbar.classList.remove("hidden");
      const meta = navItems.flatMap((group) => group.items).find((item) => item.id === state.currentView);
      pageTitle.textContent = meta.label;
      pageDesc.textContent = meta.desc;
    }

    function tagClass(type) {
      if (type === "已配置" || type === true) return "tag tag-green";
      if (type === "未配置" || type === false) return "tag tag-orange";
      if (String(type).includes("发电")) return "tag tag-blue";
      if (String(type).includes("储能")) return "tag tag-green";
      if (String(type).includes("用电")) return "tag tag-orange";
      return "tag tag-blue";
    }

    function getStationMainDataFields(type) {
      if (type.includes("集中式光伏")) {
        return ["装机容量", "汇流箱数量", "逆变器数量"];
      }
      if (type.includes("分布式光伏")) {
        return ["额定容量", "并网电压等级", "组件数量"];
      }
      if (type.includes("工商业储能") || type.includes("工商储能")) {
        return ["额定功率", "额定容量", "电池簇数量"];
      }
      if (type.includes("独立储能")) {
        return ["额定容量", "额定功率", "变流器数量"];
      }
      if (type.includes("充电站")) {
        return ["充电枪数量", "最大单枪功率", "停车位数量"];
      }
      return ["额定容量", "额定功率"];
    }

    function getDeviceMainDataFields(type) {
      const map = {
        PCS: ["额定功率", "交流侧电压", "冷却方式"],
        逆变器: ["额定功率", "MPPT 路数", "最大输入电压"],
        电表: ["精度等级", "额定电流", "接线方式"],
        充电桩: ["枪口数量", "最大输出功率", "支付方式"],
        BMS: ["电池簇数", "采样精度", "通讯协议"]
      };
      return map[type] || ["主数据项 1", "主数据项 2"];
    }

    function renderDynamicFields(title, fields) {
      return `
        <div style="margin-top: 24px;">
          <h4 class="section-title">${title}</h4>
          <div class="form-grid">
            ${fields.map((field) => `
              <div class="field">
                <label>${field}</label>
                <input type="text" placeholder="自动加载字段：${field}" />
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function normalizeInputType(value) {
      if (value === "数值") return "数字";
      if (value === "下拉") return "下拉单选";
      return value;
    }

    function getTopologyDomainLabel(stationType) {
      if (stationType.includes("发电")) return "光伏";
      if (stationType.includes("储能")) return "储能";
      if (stationType.includes("充电")) return "充电";
      return "能源";
    }

    function getTopologyModelLabel(nodeTitle, stationType, isRoot = false) {
      const domain = getTopologyDomainLabel(stationType);
      if (isRoot) return `${domain}-场站`;
      if (nodeTitle.includes("关口") || nodeTitle.includes("并网") || nodeTitle.includes("配电总柜") || nodeTitle.includes("主升压站")) {
        return `${domain}-关口`;
      }
      if (nodeTitle.includes("方阵") || nodeTitle.includes("集电线路")) return `${domain}-支路`;
      if (nodeTitle.includes("逆变器")) return `${domain}-逆变器`;
      if (nodeTitle.includes("PCS")) return `${domain}-PCS`;
      if (nodeTitle.includes("BMS")) return `${domain}-BMS`;
      if (nodeTitle.includes("储能柜") || nodeTitle.includes("储能单元")) return `${domain}-储能单元`;
      if (nodeTitle.includes("充电区")) return `${domain}-充电分区`;
      if (nodeTitle.includes("充电桩")) return `${domain}-充电桩`;
      return `${domain}-节点`;
    }

    function getTopologyModelOptions(parentTitle, stationType) {
      const domain = getTopologyDomainLabel(stationType);
      if (parentTitle.includes("站") || parentTitle.includes("电站")) {
        return [`${domain}-关口`, `${domain}-支路`, `${domain}-设备分组`];
      }
      if (parentTitle.includes("关口") || parentTitle.includes("并网") || parentTitle.includes("总柜") || parentTitle.includes("主升压站")) {
        return [`${domain}-并网`, `${domain}-逆变器`, `${domain}-PCS`, `${domain}-充电桩`];
      }
      if (parentTitle.includes("支路") || parentTitle.includes("方阵") || parentTitle.includes("线路")) {
        return [`${domain}-逆变器`, `${domain}-PCS`, `${domain}-子支路`];
      }
      return [`${domain}-子节点`, `${domain}-设备节点`, `${domain}-支路节点`];
    }

    function createTopologyDrawerState(mode, payload) {
      return {
        mode,
        nodeTitle: payload.nodeTitle || "",
        parentTitle: payload.parentTitle || "",
        spaceModel: payload.spaceModel || "",
        stationType: payload.stationType || getTopologyStation().type,
        quantity: payload.quantity || 10
      };
    }

    function getDefaultTopologyDrawer(station) {
      const defaultNode = (getTopologyNodes(station.type)[0] && getTopologyNodes(station.type)[0].title) || "";
      return createTopologyDrawerState("edit", {
        nodeTitle: defaultNode,
        parentTitle: station.name,
        spaceModel: getTopologyModelLabel(defaultNode, station.type),
        stationType: station.type,
        quantity: 10
      });
    }

    function getTopologyStation() {
      return dataStore.stations.find((item) => item.id === state.selectedTopologyStationId) || dataStore.stations[0];
    }

    function getTopologyNodes(type) {
      return topologyTemplates[type] || topologyTemplates["发电类/分布式光伏"];
    }

    function renderTopologyBranch(node, options = {}) {
      const { isRoot = false, stationName = "", stationType = "", parentTitle = "" } = options;
      const children = node.children || [];
      const headerTitle = isRoot ? "根节点" : node.title;
      const currentTitle = isRoot ? stationName : node.title;
      const currentParentTitle = isRoot ? "场站管理" : parentTitle;
      const currentSpaceModel = getTopologyModelLabel(currentTitle, stationType, isRoot);
      const isSelected = Boolean(
        state.topologyDrawer &&
        state.topologyDrawer.mode === "edit" &&
        state.topologyDrawer.nodeTitle === currentTitle &&
        state.topologyDrawer.parentTitle === currentParentTitle
      );
      const bodyHtml = isRoot
        ? `<div>${escapeHtml(stationName)}</div>`
        : `<button class="topology-link-button" type="button" data-action="toast" data-message="已模拟打开 ${node.title} 的关联设备">+ 去关联设备</button>`;

      return `
        <div class="topology-branch">
          <div
            class="topology-card${isRoot ? " root" : ""}${isSelected ? " selected" : ""}"
            data-action="open-topology-drawer"
            data-drawer-mode="edit"
            data-node-title="${escapeHtml(currentTitle)}"
            data-parent-title="${escapeHtml(currentParentTitle)}"
            data-space-model="${escapeHtml(currentSpaceModel)}"
            data-station-type="${escapeHtml(stationType)}"
          >
            <div class="topology-card-header">
              <div class="topology-card-title">
                <span class="topology-card-icon">${isRoot ? "●" : "▣"}</span>
                <span>${escapeHtml(headerTitle)}</span>
              </div>
              <div class="topology-card-actions">
                <button type="button" data-action="toast" data-message="已模拟编辑 ${isRoot ? stationName : node.title}">编辑</button>
                ${isRoot ? "" : `<button type="button" data-action="toast" data-message="已模拟删除 ${node.title}">删除</button>`}
              </div>
            </div>
            <div class="topology-card-body">
              ${bodyHtml}
            </div>
          </div>
          <button
            class="topology-plus"
            type="button"
            data-action="open-topology-drawer"
            data-drawer-mode="add"
            data-parent-title="${escapeHtml(currentTitle)}"
            data-space-model="${escapeHtml(getTopologyModelOptions(currentTitle, stationType)[0])}"
            data-station-type="${escapeHtml(stationType)}"
            data-node-title=""
          >+</button>
          ${children.length ? `
            <div class="topology-children ${children.length === 1 ? "single" : ""}">
              ${children.map((child) => renderTopologyBranch(child, {
                isRoot: false,
                stationName,
                stationType,
                parentTitle: currentTitle
              })).join("")}
            </div>
          ` : ""}
        </div>
      `;
    }

    function renderTopologyDrawer() {
      if (!state.topologyDrawer) return "";

      const drawer = state.topologyDrawer;
      const isAdd = drawer.mode === "add";
      const modelOptions = getTopologyModelOptions(drawer.parentTitle, drawer.stationType);
      const selectedModel = drawer.spaceModel || modelOptions[0];
      const title = isAdd ? "新增节点" : "编辑节点";
      const submitMessage = isAdd
        ? `已模拟新增 ${drawer.quantity} 个并联的同类型节点`
        : `已模拟更新节点 ${drawer.nodeTitle || "未命名节点"}`;

      return `
        <aside class="topology-drawer">
          <div class="topology-drawer-header">
            <div class="topology-drawer-title">
              <span class="topology-drawer-icon">▣</span>
              <span>${title}</span>
            </div>
            <button class="topology-drawer-close" type="button" data-action="close-topology-drawer">&times;</button>
          </div>
          <div class="topology-drawer-body">
            <div class="topology-drawer-form">
              <div class="topology-drawer-row">
                <label>上级节点:</label>
                <input type="text" value="${escapeHtml(drawer.parentTitle)}" readonly />
              </div>
              <div class="topology-drawer-row">
                <label>空间模型:</label>
                <select>
                  ${modelOptions.map((item) => `<option ${item === selectedModel ? "selected" : ""}>${item}</option>`).join("")}
                </select>
              </div>
              <div class="topology-drawer-row">
                <label class="required">节点名称:</label>
                <input type="text" value="${escapeHtml(drawer.nodeTitle || "")}" placeholder="请输入节点名称" />
              </div>
              ${isAdd ? `
                <div class="topology-drawer-row">
                  <label class="required">节点数量:</label>
                  <input type="number" min="1" value="${drawer.quantity}" />
                </div>
              ` : ""}
            </div>
            ${isAdd ? `
              <div class="topology-drawer-tip">
                优化方案模拟：当这里填写 <strong>${drawer.quantity}</strong> 时，点击“确定”后会自动生成 ${drawer.quantity} 个并联的同类型节点，
                并统一挂载在“${escapeHtml(drawer.parentTitle)}”下，减少逐个新增和逐个关联设备的重复操作。
              </div>
            ` : `
              <div class="topology-drawer-tip">
                当前为静态原型抽屉。点击不同节点，可在右侧切换对应的编辑表单；点击节点下方的 “+” 按钮，可打开新增节点表单并配置节点数量。
              </div>
            `}
          </div>
          <div class="topology-drawer-footer">
            <button class="btn btn-default" type="button" data-action="close-topology-drawer">取消</button>
            <button class="btn btn-primary" type="button" data-action="toast" data-message="${submitMessage}">确定</button>
          </div>
        </aside>
      `;
    }

    function renderTopologyConfig() {
      const station = getTopologyStation();
      const topologyNodes = getTopologyNodes(station.type);

      return `
        <div class="topology-page">
          <div class="topology-header">
            <button class="topology-back" type="button" data-action="back-topology">&lt;</button>
            <div>
              <h2>场站管理</h2>

              <div class="topology-stage" id="topology-stage">
                <div class="topology-stage-inner" id="topology-stage-inner">
                  <div class="topology-tree" id="topology-tree">
                    ${renderTopologyBranch({ title: "根节点", children: topologyNodes }, {
                      isRoot: true,
                      stationName: station.name,
                      stationType: station.type,
                      parentTitle: "场站管理"
                    })}
                  </div>
                </div>
              </div>
              ${renderTopologyDrawer()}
            </div>
          </section>
        </div>
      `;
    }

    function syncTopologyViewport() {
      if (state.currentView !== "topology-config") return;

      const stage = document.getElementById("topology-stage");
      const stageInner = document.getElementById("topology-stage-inner");
      const tree = document.getElementById("topology-tree");
      if (!stage || !stageInner || !tree) return;

      tree.style.transform = "translateX(-50%) scale(1)";
      stageInner.style.height = "";

      const treeWidth = tree.scrollWidth;
      const treeHeight = tree.scrollHeight;
      const availableWidth = Math.max(stage.clientWidth - 24, 320);
      const availableHeight = Math.max(stage.clientHeight - 24, 320);

      if (!treeWidth || !treeHeight) return;

      const scale = Math.min(1, availableWidth / treeWidth, availableHeight / treeHeight);
      tree.style.transform = `translateX(-50%) scale(${scale})`;
      stageInner.style.height = `${Math.max(treeHeight * scale + 24, availableHeight)}px`;
      stage.scrollTop = 0;
      stage.scrollLeft = 0;
    }

    function scheduleTopologyViewportSync() {
      if (typeof requestAnimationFrame === "function") {
        requestAnimationFrame(() => syncTopologyViewport());
        return;
      }
      setTimeout(syncTopologyViewport, 0);
    }

    function renderModalContent(type, payload = {}) {
      if (type === "brand") {
        return {
          title: "新增品牌厂商",
          subtitle: "字段来源于 add.md，可用于弹窗结构展示。",
          body: `
            <div class="form-grid">
              <div class="field">
                <label>厂商品牌名称 *</label>
                <input type="text" placeholder="请输入厂商品牌名称" />
              </div>
              
              <div class="field">
                <label>英文名称 *</label>
                <input type="text" placeholder="请输入英文名称" />
              </div>
              <div class="field span-2">
                <label>备注</label>
                <textarea placeholder="请输入备注"></textarea>
              </div>
            </div>
          `
        };
      }

      if (type === "station-type") {
        return {
          title: "新增场站类型",
          subtitle: "用于定义场站模板主数据结构。",
          body: `
            <div class="form-grid">
              <div class="field">
                <label>场站类型类型名称</label>
                <input type="text" placeholder="请输入场站类型名称" />
              </div>
              <div class="field">
                <label>英文名称</label>
                <input type="text" placeholder="请输入英文名称" />
              </div>
             
              <div class="field">
                <label>所属分组</label>
                <select>
                  <option>发电类</option>
                  <option>储能类</option>
                  <option>用电类</option>
                </select>
              </div>
            </div>
          `
        };
      }

      if (type === "station-main-data") {
        const isEdit = payload.modalMode === "edit";
        const selectedStationModel = dataStore.stationModels.find((item) => item.id === state.selectedStationModelId);
        const currentInputType = payload.inputType || "文本";
        return {
          title: isEdit ? "编辑场站主数据" : "新增场站主数据",
          subtitle: isEdit
            ? `${selectedStationModel ? `${selectedStationModel.name} / ` : ""}${payload.name || "当前主数据"}，主数据编码不可修改。`
            : "挂载到当前选中的场站类型模板下。",
          body: `
            <div class="form-grid">
              <div class="field">
                <label>主数据名称 *</label>
                <input type="text" placeholder="请输入主数据名称" value="${escapeHtml(payload.name || "")}" />
              </div>
              <div class="field">
                <label>英文名称 *</label>
                <input type="text" placeholder="请输入英文名称" value="${escapeHtml(payload.englishName || "")}" />
              </div>
              <div class="field">
                <label>主数据编码 *</label>
                <input
                  type="text"
                  placeholder="请输入主数据编码"
                  value="${escapeHtml(payload.code || "")}"
                  ${isEdit ? 'readonly style="background: #f5f7fb; color: var(--muted); cursor: not-allowed;"' : ""}
                />
              </div>
              <div class="field">
                <label>是否必填 *</label>
                <select>
                  <option ${payload.required === "true" || payload.required === true ? "selected" : ""}>必填</option>
                  <option ${(payload.required === "false" || payload.required === false) ? "selected" : ""}>选填</option>
                </select>
              </div>
              <div class="field">
                <label>录入类型 *</label>
                <select>
                  <option ${currentInputType === "文本" ? "selected" : ""}>文本</option>
                  <option ${currentInputType === "数字" ? "selected" : ""}>数字</option>
                  <option ${currentInputType === "下拉单选" ? "selected" : ""}>下拉单选</option>
                  <option ${currentInputType === "下拉多选" ? "selected" : ""}>下拉多选</option>
                </select>
              </div>
              <div class="field">
                <label>主数据排序 *</label>
                <input type="number" placeholder="请输入排序" value="${escapeHtml(payload.order || "")}" />
              </div>
            </div>
          `
        };
      }

      if (type === "station") {
        const selectedType = state.filters.stationManagement.type || "储能类/工商业储能";
        return {
          title: "新增场站",
          subtitle: "地址支持地图点选映射经纬度，主数据区随场站类型变化。",
          body: `
            <div class="form-grid">
              <div class="field">
                <label>场站名称 *</label>
                <input type="text" placeholder="请输入场站名称" />
              </div>
              <div class="field">
                <label>场站类型 *</label>
                <select id="station-type-select">
                  ${stationTypeOptions.map((item) => `
                    <option value="${item}" ${item === selectedType ? "selected" : ""}>${item}</option>
                  `).join("")}
                </select>
              </div>
              <div class="field">
                <label>并网日期 *</label>
                <input type="date" placeholder="请选择并网日期" />
              </div>
              <div class="field">
                <label>场站性质 *</label>
                <select>
                  <option>自持</option>
                  <option>代运营</option>
                </select>
              </div>
              <div class="field">
                <label>所属运营方 *</label>
                <input type="text" placeholder="请输入所属运营方" />
              </div>
              <div class="field">
                <label>运维负责人姓名 *</label>
                <input type="text" placeholder="请输入负责人姓名" />
              </div>
              <div class="field">
                <label>联系电话 *</label>
                <input type="text" placeholder="请输入联系电话" />
              </div>
              <div class="field span-2">
                <label>详细地址 *</label>
                <input type="text" placeholder="请输入省市（县）区 - 街道 - 详细地址" />
              </div>
              <div class="field span-2">
                <label>地图定位</label>
                <div class="hint-box" style="margin-top: 0;">
                  地图加载后点选位置，此处映射经纬度坐标。示意坐标：120.7254, 31.3297
                </div>
              </div>
            </div>
            <div id="station-main-data-fields">
              ${renderDynamicFields("主数据区", getStationMainDataFields(selectedType))}
            </div>
          `
        };
      }

      if (type === "device") {
        const selectedDeviceType = state.filters.deviceManagement.type || "PCS";
        return {
          title: "新增设备",
          subtitle: "主数据区根据设备类型自动加载字段。",
          body: `
            <div class="form-grid">
              <div class="field">
                <label>设备名称 *</label>
                <input type="text" placeholder="请输入设备名称" />
              </div>
              <div class="field">
                <label>设备原厂SN号 *</label>
                <input type="text" placeholder="请输入设备原厂SN号" />
              </div>
              <div class="field">
                <label>设备类型 *</label>
                <select id="device-type-select">
                  ${deviceTypes.map((item) => `
                    <option value="${item}" ${item === selectedDeviceType ? "selected" : ""}>${item}</option>
                  `).join("")}
                </select>
              </div>
              <div class="field">
                <label>所属场站 *</label>
                <select>
                  ${dataStore.stations.map((item) => `<option>${item.name}</option>`).join("")}
                </select>
              </div>
              <div class="field">
                <label>品牌厂商</label>
                <select>
                  <option value="">请选择品牌厂商</option>
                  ${dataStore.brands.map((item) => `<option>${item.name}</option>`).join("")}
                </select>
              </div>
              <div class="field">
                <label>型号</label>
                <input type="text" placeholder="请输入设备型号" />
              </div>
            </div>
            <div id="device-main-data-fields">
              ${renderDynamicFields("主数据区", getDeviceMainDataFields(selectedDeviceType))}
            </div>
          `
        };
      }

      return { title: "提示", subtitle: "", body: "<div class='empty'>暂无内容</div>" };
    }

    function openModal(type, payload = {}) {
      state.modal = { type, payload };
      const modal = renderModalContent(type, payload);
      modalTitle.textContent = modal.title;
      modalSubtitle.textContent = modal.subtitle;
      modalBody.innerHTML = modal.body;
      modalMask.classList.add("show");
      modalMask.setAttribute("aria-hidden", "false");
      attachModalDynamicEvents();
    }

    function closeModal() {
      state.modal = null;
      modalMask.classList.remove("show");
      modalMask.setAttribute("aria-hidden", "true");
      modalBody.innerHTML = "";
    }

    function attachModalDynamicEvents() {
      const stationTypeSelect = document.getElementById("station-type-select");
      if (stationTypeSelect) {
        stationTypeSelect.addEventListener("change", (event) => {
          const target = document.getElementById("station-main-data-fields");
          target.innerHTML = renderDynamicFields("主数据区", getStationMainDataFields(event.target.value));
        });
      }

      const deviceTypeSelect = document.getElementById("device-type-select");
      if (deviceTypeSelect) {
        deviceTypeSelect.addEventListener("change", (event) => {
          const target = document.getElementById("device-main-data-fields");
          target.innerHTML = renderDynamicFields("主数据区", getDeviceMainDataFields(event.target.value));
        });
      }
    }

    function showToast(message) {
      window.alert(message);
    }

    function resetFilters(view) {
      if (view === "brands") state.filters.brands = { keyword: "" };
      if (view === "stationModels") {
        state.filters.stationModels = { name: "", category: "" };
        state.stationModelPage = 1;
      }
      if (view === "stationManagement") state.filters.stationManagement = { name: "", type: "", topology: "" };
      if (view === "deviceManagement") state.filters.deviceManagement = { name: "", type: "", sn: "", station: "" };
      render();
    }

    function renderCurrentView() {
      if (state.currentView === "device-types") return renderDeviceTypes();
      if (state.currentView === "brands") return renderBrands();
      if (state.currentView === "station-models") return renderStationModels();
      if (state.currentView === "point-management") return renderBlankView("点位管理");
      if (state.currentView === "space-models") return renderBlankView("空间模型");
      if (state.currentView === "station-management") return renderStationManagement();
      if (state.currentView === "topology-config") return renderTopologyConfig();
      return renderDeviceManagement();
    }

    function render() {
      renderNav();
      renderTopbar();
      app.innerHTML = renderCurrentView();
      if (state.currentView === "topology-config") {
        scheduleTopologyViewportSync();
      }
    }

    document.addEventListener("click", (event) => {
      const navButton = event.target.closest("[data-nav]");
      if (navButton) {
        state.currentView = navButton.dataset.nav;
        render();
        return;
      }

      const actionButton = event.target.closest("[data-action]");
      if (!actionButton) return;

      const { action } = actionButton.dataset;

      if (action === "open-modal") {
        const payload = { ...actionButton.dataset };
        delete payload.action;
        delete payload.modal;
        openModal(actionButton.dataset.modal, payload);
        return;
      }

      if (action === "reset-filters") {
        resetFilters(actionButton.dataset.view);
        return;
      }

      if (action === "select-station-model") {
        state.selectedStationModelId = Number(actionButton.dataset.id);
        render();
        return;
      }

      if (action === "switch-station-model-page") {
        state.stationModelPage = Number(actionButton.dataset.page);
        render();
        return;
      }

      if (action === "select-device-type") {
        state.selectedDeviceTypeId = Number(actionButton.dataset.id);
        render();
        return;
      }

      if (action === "switch-device-type-tab") {
        state.deviceTypeTab = actionButton.dataset.tab;
        render();
        return;
      }

      if (action === "open-topology") {
        state.selectedTopologyStationId = Number(actionButton.dataset.id);
        state.topologyDrawer = getDefaultTopologyDrawer(
          dataStore.stations.find((item) => item.id === state.selectedTopologyStationId) || dataStore.stations[0]
        );
        state.currentView = "topology-config";
        render();
        return;
      }

      if (action === "open-topology-drawer") {
        state.topologyDrawer = createTopologyDrawerState(actionButton.dataset.drawerMode || "edit", {
          nodeTitle: actionButton.dataset.nodeTitle || "",
          parentTitle: actionButton.dataset.parentTitle || "",
          spaceModel: actionButton.dataset.spaceModel || "",
          stationType: actionButton.dataset.stationType || getTopologyStation().type,
          quantity: 10
        });
        render();
        return;
      }

      if (action === "close-topology-drawer") {
        state.topologyDrawer = null;
        render();
        return;
      }

      if (action === "back-topology") {
        state.currentView = "station-management";
        state.topologyDrawer = null;
        render();
        return;
      }

      if (action === "fit-topology") {
        scheduleTopologyViewportSync();
        showToast("已按当前窗口自适应展示全局拓扑");
        return;
      }

      if (action === "toast") {
        showToast(actionButton.dataset.message);
        return;
      }

      if (action === "search") {
        render();
        showToast("已按当前条件筛选列表");
      }
    });

    document.addEventListener("input", (event) => {
      const target = event.target;
      const view = target.dataset.filterView;
      const key = target.dataset.filterKey;
      if (!view || !key) return;
      state.filters[view][key] = target.value;
      if (view === "stationModels") state.stationModelPage = 1;
    });

    document.addEventListener("change", (event) => {
      const target = event.target;
      const view = target.dataset.filterView;
      const key = target.dataset.filterKey;
      if (!view || !key) return;
      state.filters[view][key] = target.value;
      if (view === "stationModels") state.stationModelPage = 1;
    });

    modalClose.addEventListener("click", closeModal);
    modalCancel.addEventListener("click", closeModal);
    modalSave.addEventListener("click", () => {
      showToast("已模拟提交，原型不落真实数据");
      closeModal();
    });
    modalMask.addEventListener("click", (event) => {
      if (event.target === modalMask) closeModal();
    });

    if (typeof window.addEventListener === "function") {
      window.addEventListener("resize", () => {
        if (state.currentView === "topology-config") {
          scheduleTopologyViewportSync();
        }
      });
    }

    render();
  </script>
</body>
</html>
